# Here is where the configuration files are stored

# Time (in seconds) before a player is kicked if they haven't authenticated.
auto_kick_time: 30

# Whether or not to hide the player's inventory until they are authenticated.
# Set to true to hide the inventory, false to show the inventory immediately.
hide_inventory_until_authenticated: true
